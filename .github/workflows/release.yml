name: Release

on:
  push:
    tags:
      - 'atomfortune-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. atomfortune-v0.0.3)'
        required: true

permissions:
  contents: write

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Determine tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi
      - name: Create release if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ref.outputs.tag }}"
          VERSION="${TAG#atomfortune-}"
          gh release view "$TAG" --repo Xavier9031/AtomFortune > /dev/null 2>&1 || \
            gh release create "$TAG" --repo Xavier9031/AtomFortune \
              --title "$VERSION" --generate-notes

  build-mac:
    name: Build macOS App
    needs: create-release
    runs-on: macos-latest

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build API
        run: cd api && npm ci && npm run build

      - name: Build Next.js standalone
        run: |
          cd web && npm ci && npm run build
          cp -r .next/static .next/standalone/web/.next/static
          cp -r public .next/standalone/web/public

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build .dmg
        run: cd desktop && npm run build && npx electron-builder --mac --publish never

      - name: Upload DMG and update manifest to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ref.outputs.ref }}"
          DMG=$(ls desktop/release/*.dmg)
          gh release upload "$TAG" "$DMG" --repo Xavier9031/AtomFortune --clobber
          gh release upload "$TAG" desktop/release/latest-mac.yml --repo Xavier9031/AtomFortune --clobber

  build-windows:
    name: Build Windows App
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Determine ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build API
        shell: bash
        run: cd api && npm ci && npm run build

      - name: Build Next.js standalone
        shell: bash
        run: |
          cd web && npm ci && npm run build
          cp -r .next/static .next/standalone/web/.next/static
          cp -r public .next/standalone/web/public

      - name: Install desktop dependencies
        shell: bash
        run: cd desktop && npm ci

      - name: Build .exe
        shell: bash
        run: cd desktop && npm run build && npx electron-builder --win --publish never

      - name: Upload installer and update manifest to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ref.outputs.ref }}"
          EXE=$(ls desktop/release/*.exe)
          gh release upload "$TAG" "$EXE" --repo Xavier9031/AtomFortune --clobber
          gh release upload "$TAG" desktop/release/latest.yml --repo Xavier9031/AtomFortune --clobber

  build-linux:
    name: Build Linux App
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Determine ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "ref=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build API
        run: cd api && npm ci && npm run build

      - name: Build Next.js standalone
        run: |
          cd web && npm ci && npm run build
          cp -r .next/static .next/standalone/web/.next/static
          cp -r public .next/standalone/web/public

      - name: Install desktop dependencies
        run: cd desktop && npm ci

      - name: Build .AppImage
        run: cd desktop && npm run build && npx electron-builder --linux --publish never

      - name: Upload AppImage and update manifest to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ref.outputs.ref }}"
          APPIMAGE=$(ls desktop/release/*.AppImage)
          gh release upload "$TAG" "$APPIMAGE" --repo Xavier9031/AtomFortune --clobber
          gh release upload "$TAG" desktop/release/latest-linux.yml --repo Xavier9031/AtomFortune --clobber
