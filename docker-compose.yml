services:
  api:
    build: ./api
    environment:
      DATABASE_PATH: /data/atomfortune.db
      API_TOKEN: ${API_TOKEN:-}
      SNAPSHOT_SCHEDULE: "0 22 * * *"
      WEB_ORIGIN: http://web:3000
    ports:
      - "8001:8000"
    volumes:
      - dbdata:/data
  web:
    build: ./web
    environment:
      API_ORIGIN: http://api:8000
      API_TOKEN: ${API_TOKEN:-}
    ports:
      - "3001:3000"
    depends_on: [api]
volumes:
  dbdata:
